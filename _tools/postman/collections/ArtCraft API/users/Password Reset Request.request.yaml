$kind: http-request
name: Password Reset Request
url: "{{api_host}}/v1/password_reset/request"
method: POST
headers:
  - key: Accept
    value: application/json
  - key: Cookie
    value: ""
    disabled: true
body:
  type: json
  content: |-
    {
        "username_or_email": "newuser"
    }
order: 5000
