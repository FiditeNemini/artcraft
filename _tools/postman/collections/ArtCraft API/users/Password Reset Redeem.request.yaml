    value: application/json
  - key: Cookie
    value: ""
    disabled: true
body:
  type: json
  content: |-
    {
        "reset_token": "redacted",
        "new_password": "foobarbaz",
        "new_password_validation": "foobarbaz"
    }
order: 6000
