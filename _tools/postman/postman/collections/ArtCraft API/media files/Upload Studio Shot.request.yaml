$kind: http-request
name: Upload Studio Shot
url: https://upload.storyteller.ai/v1/media_files/upload/studio_shot
method: POST
headers:
  - key: Accept
    value: application/json
  - key: Session
    value: ""
    disabled: true
body:
  type: formdata
  content:
    - type: text
      key: maybe_title
      value: Foo Bar Baz
      disabled: false
    - type: text
      key: uuid_idempotency_token
      value: "{{$randomUUID}}"
      disabled: false
    - type: file
      key: file
      src: []
      disabled: false
order: 6000
